<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Humanitarno Zdruzenie Labunishta Italia</title>
<style>
:root{
  --blue:#0b326b;
  --blue2:#0f64b7;
  --light:#eef7ff;
  --text:#162033;
  --muted:#637083;
  --green:#0d9f72;
  --green2:#087a5b;
  --yellow:#ffc439;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:linear-gradient(180deg,#eef8ff 0%,#fff 100%);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px;
}
.card{
  width:100%;
  max-width:430px;
  background:
    linear-gradient(rgba(255,255,255,.84),rgba(255,255,255,.96)),
    url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200');
  background-size:cover;
  background-position:center;
  border-radius:28px;
  padding:18px 15px 14px;
  box-shadow:0 18px 45px rgba(18,63,120,.18);
  border:1px solid rgba(18,63,120,.08);
  text-align:center;
  overflow:hidden;
}
.logo{
  width:165px;
  height:165px;
  object-fit:cover;
  border-radius:50%;
  box-shadow:0 10px 25px rgba(18,63,120,.20);
  margin-bottom:10px;
}
h1{
  font-size:30px;
  line-height:1.08;
  margin:0 0 16px;
  color:var(--blue);
  font-weight:800;
  letter-spacing:-.6px;
}
.buttons{display:grid;gap:9px}
.btn{
  width:100%;
  border:0;
  border-radius:17px;
  padding:12px 14px;
  min-height:56px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  text-decoration:none;
  font-size:18px;
  font-weight:750;
  cursor:pointer;
  transition:.15s;
  box-shadow:0 7px 18px rgba(15,100,183,.14);
}
.btn:active{transform:scale(.98)}
.btn-left{display:flex;align-items:center;gap:12px;text-align:left;min-width:0}
.btn-blue{background:linear-gradient(135deg,var(--blue),#062657);color:#fff}
.btn-green{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff}
.btn-mail{background:linear-gradient(135deg,var(--blue),#062657);color:#fff}
.btn-paypal{background:var(--yellow);color:#123f78;margin-top:10px}
.icon{width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;object-fit:contain}
.icon-big{font-size:28px;line-height:1}
.paypal-icon{width:48px;height:auto;flex:0 0 auto}
.arrow{font-size:34px;font-weight:300;line-height:1;opacity:.9}
.email-wrap{min-width:0}.email-label{font-size:18px;font-weight:750;line-height:1}.email-small{font-size:13px;font-weight:500;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:285px}
.donation{margin-top:12px;background:#f7fbff;border:1px solid #dcecff;border-radius:18px;padding:10px}.donation-title{font-size:13px;color:var(--muted);font-weight:700;margin-bottom:6px}.iban-row{display:flex;align-items:center;justify-content:space-between;gap:8px;background:#fff;border-radius:14px;padding:9px 9px 9px 12px;border:1px solid #e1eefb}.iban{font-size:13px;font-weight:750;color:var(--blue);word-break:break-all;text-align:left}.copy-btn{background:none;border:0;padding:5px;cursor:pointer;display:flex;align-items:center;justify-content:center}.copied{font-size:12px;color:#198754;margin-top:5px;display:none;font-weight:700}.footer{font-size:11px;color:#778397;margin-top:10px}.modal{position:fixed;inset:0;background:rgba(5,15,30,.55);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:18px;z-index:99}.modal.show{display:flex}.modal-box{width:100%;max-width:390px;background:#fff;border-radius:24px;padding:18px;box-shadow:0 22px 60px rgba(0,0,0,.28);animation:pop .18s ease-out}.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.modal-head h2{margin:0;color:var(--blue);font-size:21px}.close{border:0;background:#edf4fb;border-radius:50%;width:34px;height:34px;font-size:20px;cursor:pointer}.person{display:flex;align-items:center;justify-content:space-between;text-decoration:none;background:#f3f8ff;border:1px solid #dcecff;border-radius:16px;padding:12px 14px;margin-top:8px;color:var(--blue)}.person strong{font-size:17px}.person span{font-size:13px;color:var(--muted)}.person .action{font-size:23px;color:var(--blue)}@keyframes pop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
@media(max-height:720px){body{align-items:flex-start;padding:6px}.card{padding:10px 12px;border-radius:22px}.logo{width:120px;height:120px;margin-bottom:6px}h1{font-size:24px;margin-bottom:10px}.buttons{gap:6px}.btn{min-height:48px;padding:9px 12px;font-size:16px;border-radius:14px}.icon{width:24px;height:24px}.icon-big{font-size:24px}.paypal-icon{width:42px}.email-label{font-size:16px}.email-small{font-size:12px;max-width:245px}.donation{margin-top:7px;padding:8px}.iban-row{padding:7px 7px 7px 10px}.iban{font-size:12px}.footer{margin-top:5px;font-size:10px}}
</style>
</head>
<body>
<main class="card">
  <img class="logo" src="logo.jpeg" alt="Logo Humanitarno Zdruzenie Labunishta Italia">
  <h1>Humanitarno Zdruzenie<br>Labunishta Italia</h1>

  <div class="buttons">
    <button class="btn btn-blue" onclick="openModal('callModal')">
      <span class="btn-left"><span class="icon-big">📞</span><span>Chiama</span></span>
      <span class="arrow">›</span>
    </button>

    <button class="btn btn-green" onclick="openModal('waModal')" aria-label="Scrivi su WhatsApp">
      <span class="btn-left">
        <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
        <span>WhatsApp</span>
      </span>
      <span class="arrow">›</span>
    </button>

    <a class="btn btn-mail" href="mailto:info.labunishta.italia@gmail.com">
      <span class="btn-left">
        <span class="icon-big">✉️</span>
        <span class="email-wrap"><span class="email-label">Email</span><br><span class="email-small">info.labunishta.italia@gmail.com</span></span>
      </span>
      <span class="arrow">›</span>
    </a>

    <a class="btn btn-paypal" href="https://paypal.me/hzlabunishtaitalia" target="_blank" rel="noopener">
      <span class="btn-left">
        <img class="paypal-icon" src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal">
        <span>Dona ora con PayPal</span>
      </span>
      <span class="arrow">›</span>
    </a>
  </div>

  <section class="donation">
    <div class="donation-title">Donazione tramite bonifico</div>
    <div class="iban-row">
      <div class="iban" id="iban">IT65Z0200861624000107426851</div>
      <button class="copy-btn" onclick="copyIBAN()" aria-label="Copia IBAN">
        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
      </button>
    </div>
    <div id="copied" class="copied">IBAN copiato</div>
  </section>

  <div class="footer">© Humanitarno Zdruzenie Labunishta Italia</div>
</main>

<div id="callModal" class="modal" onclick="closeOnBg(event,'callModal')"><div class="modal-box"><div class="modal-head"><h2>Scegli chi chiamare</h2><button class="close" onclick="closeModal('callModal')">×</button></div><div id="callList"></div></div></div>
<div id="waModal" class="modal" onclick="closeOnBg(event,'waModal')"><div class="modal-box"><div class="modal-head"><h2>Scegli WhatsApp</h2><button class="close" onclick="closeModal('waModal')">×</button></div><div id="waList"></div></div></div>

<script>
const people=[['Drini','+39 353 428 2315','393534282315'],['Arben','+39 377 296 0422','393772960422'],['Anes','+39 389 454 8861','393894548861'],['Haris','+39 389 449 6495','393894496495']];
function makeLists(){document.getElementById('callList').innerHTML=people.map(p=>`<a class="person" href="tel:+${p[2]}"><div><strong>${p[0]}</strong><br><span>${p[1]}</span></div><div class="action">📞</div></a>`).join('');document.getElementById('waList').innerHTML=people.map(p=>`<a class="person" href="https://wa.me/${p[2]}" target="_blank" rel="noopener"><div><strong>${p[0]}</strong><br><span>${p[1]}</span></div><div class="action">💬</div></a>`).join('')}
function openModal(id){document.getElementById(id).classList.add('show')}function closeModal(id){document.getElementById(id).classList.remove('show')}function closeOnBg(e,id){if(e.target.id===id)closeModal(id)}
function copyIBAN(){const iban=document.getElementById('iban').innerText;navigator.clipboard.writeText(iban).then(()=>{const c=document.getElementById('copied');c.style.display='block';setTimeout(()=>c.style.display='none',1700)})}
makeLists();
</script>
</body>
</html>
