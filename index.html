<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Humanitarno Zdruzenie Labunishta Italia</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #f5f7f8 0%, #e9eef1 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 14px;
      color: #102a43;
    }
    .card {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      border-radius: 24px;
      padding: 28px 20px 24px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.12);
      text-align: center;
    }
    .logo {
      width: 210px;
      height: 210px;
      object-fit: contain;
      margin: 0 auto 18px;
      display: block;
      border-radius: 50%;
    }
    h1 {
      font-size: 27px;
      line-height: 1.15;
      margin: 12px 0 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #0b253a;
    }
    .subtitle {
      margin: 0 0 24px;
      font-size: 16px;
      color: #587084;
    }
    .button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      min-height: 64px;
      margin: 13px 0;
      border-radius: 14px;
      text-decoration: none;
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
      background: #111111;
      box-shadow: 0 8px 18px rgba(0,0,0,0.14);
    }
    .button.donate {
      background: linear-gradient(135deg, #0d5c8a, #16936b);
    }
    .button.email {
      background: #102a43;
    }
    .icon { font-size: 24px; }
    .footer {
      margin-top: 22px;
      font-size: 14px;
      color: #7b8794;
    }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="logo.jpeg" alt="Logo Humanitarno Zdruzenie Labunishta Italia" />

    <h1>Humanitarno Zdruzenie Labunishta Italia</h1>
    <p class="subtitle">Associazione umanitaria</p>

    <a class="button donate" href="https://paypal.me/hzlabunishtaitalia" target="_blank" rel="noopener">
      <span class="icon">❤️</span> Dona ora
    </a>

    <a class="button email" href="mailto:info.labunishta.italia@gmail.com">
      <span class="icon">✉️</span> info.labunishta.italia@gmail.com
    </a>

    <div class="footer">Labunishta • Italia</div>
  </main>
</body>
</html>
